display_information:
  name: "{{AGENT_DISPLAY_NAME}}"
  description: "{{AGENT_DESCRIPTION}}"
  background_color: "#{{HEX_COLOR}}"
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: "{{AGENT_DISPLAY_NAME}}"
    always_online: true
  slash_commands: []
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - reactions:read
      - reactions:write
      - users:read
      - usergroups:read
      - files:read
      - commands
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
  socket_mode_enabled: true
  org_deploy_enabled: false
